# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit configuration for openclaw.
# Docs: https://docs.coderabbit.ai/guides/configure-coderabbit

language: en-US
early_access: false

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: true
    base_branches:
      - main
  path_filters:
    # Generated artifacts — don't review, source-of-truth lives elsewhere.
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/.next/**"
    - "!**/coverage/**"
    - "!**/*.sha256"
    - "!docs/.generated/**"
    - "!ui/src/i18n/locales/!(en).ts"
    - "!ui/src/i18n/.i18n/**"
    - "!**/*.snap"
    - "!**/__snapshots__/**"
    - "!pnpm-lock.yaml"
    - "!**/build-info.json"
    - "!src/canvas-host/a2ui/.bundle.hash"
    - "!vendor/**"
  path_instructions:
    - path: "src/gateway/protocol/**"
      instructions: |
        Gateway wire protocol. Treat schema changes as breaking. Verify the
        change is additive when possible, or flag if it requires explicit
        versioning/client follow-through. Check that new fields/methods have
        TypeBox schemas added to protocol-schemas.ts.
    - path: "src/channels/**"
      instructions: |
        Core channel logic. Flag any direct imports from extensions/*/src/**
        or onboard.js — these must go through openclaw/plugin-sdk seams.
        Hot import paths (channel.ts, shared.ts, gateway.ts) should use
        small *.runtime.ts seams to avoid loading large async surfaces.
    - path: "extensions/**"
      instructions: |
        Bundled plugins. Imports must be from openclaw/plugin-sdk/* only —
        no core src/**, src/plugin-sdk-internal/**, other extension src/**,
        or relative paths escaping the package root. Manifest metadata
        (openclaw.plugin.json) should match runtime behavior.
    - path: "src/gateway/**"
      instructions: |
        Gateway server. Don't materialize bundled plugin runtime for static
        descriptor queries — prefer lightweight artifact resolvers. Keep
        schedulers/pollers/background loops disabled in manual-RPC tests.
    - path: "**/*.test.ts"
      instructions: |
        Vitest tests. Verify test cleans up timers/env/globals/mocks/sockets/
        temp dirs/module state. Avoid per-test vi.resetModules() with heavy
        imports. Prefer injection over module mocking; if module mocking,
        mock narrow local *.runtime.ts, not broad barrels.
    - path: "ui/src/i18n/locales/en.ts"
      instructions: |
        i18n source of truth. Other locale bundles are auto-generated by
        scripts/control-ui-i18n.ts and should not be hand-edited. After
        changes here, run pnpm ui:i18n:sync.
    - path: "scripts/**"
      instructions: |
        Local tooling. Prefer existing wrappers (run-vitest.mjs, run-oxlint.mjs,
        run-tsgo.mjs) over raw tool entrypoints. Respect the local heavy-check
        lock in scripts/lib/local-heavy-check-runtime.mjs.
    - path: "**/CHANGELOG.md"
      instructions: |
        User-facing changes only. Each entry must be a single line with a
        "Thanks @author" attribution using a credited GitHub username (never
        @codex/@openclaw/@steipete).
  tools:
    languagetool:
      enabled: true
    markdownlint:
      enabled: true
    shellcheck:
      enabled: true
    yamllint:
      enabled: true
    actionlint:
      enabled: true

chat:
  auto_reply: true
